app.jwt.secret=replace-with-your-own-32-plus-character-secret
spring.datasource.url=jdbc:mysql://localhost:3306/applicationtracker?createDatabaseIfNotExist=true&serverTimezone=America/Chicago
spring.datasource.username=root
spring.datasource.password=change-me
app.upload.dir=uploads
app.cors.allowed-origins=http://localhost:5173
app.seed-demo-data=true
app.usajobs.user-agent=your-email@example.com
app.usajobs.api-key=replace-with-your-usajobs-api-key
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

spring.datasource.hikari.maximumPoolSize=5
spring.datasource.hikari.minimumIdle=1
spring.datasource.hikari.maxLifetime=240000
spring.datasource.hikari.idleTimeout=60000
spring.datasource.hikari.keepaliveTime=30000
spring.datasource.hikari.validationTimeout=5000
