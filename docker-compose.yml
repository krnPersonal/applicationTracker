version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: applicationtracker-mysql
    environment:
      MYSQL_DATABASE: applicationtracker
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    container_name: applicationtracker-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/applicationtracker?serverTimezone=America/Chicago
      DB_USERNAME: root
      DB_PASSWORD: password
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"

volumes:
  mysql-data:
